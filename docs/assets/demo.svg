<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="460" rx="10" fill="#0d1117"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">crxray — unpack · audit · score</text>

  <text x="24" y="64" fill="#7ee787">$ crxray scan coupon-helper.crx</text>
  <text x="24" y="88" fill="#c9d1d9" xml:space="preserve">identity  Coupon Helper Pro · v4.2.1 · MV2 · id ponmlkji…mnop</text>
  <text x="24" y="108" fill="#c9d1d9" xml:space="preserve">risk      100/100 · <tspan fill="#f85149">CRITICAL</tspan></text>
  <text x="24" y="128" fill="#8b949e" xml:space="preserve">breakdown permissions 45 · csp 30 · remote-code 45 · network 22</text>

  <text x="24" y="160" fill="#c9d1d9" xml:space="preserve">SEVERITY  RULE                      LOCATION       FINDING</text>
  <text x="24" y="180" fill="#c9d1d9" xml:space="preserve"><tspan fill="#f85149">critical</tspan>  PERM_COMBO_COOKIES        manifest.json  cookies + broad hosts</text>
  <text x="24" y="200" fill="#c9d1d9" xml:space="preserve"><tspan fill="#f85149">critical</tspan>  CSP_REMOTE_SCRIPT_SRC     manifest.json  whitelists remote scripts</text>
  <text x="24" y="220" fill="#c9d1d9" xml:space="preserve"><tspan fill="#f85149">critical</tspan>  RCL_IMPORTSCRIPTS_REMOTE  background.js  importScripts() from a URL</text>
  <text x="24" y="240" fill="#c9d1d9" xml:space="preserve"><tspan fill="#d29922">high</tspan>      OBF_OBFUSCATED            inject.js      obfuscated JavaScript</text>
  <text x="24" y="260" fill="#c9d1d9" xml:space="preserve"><tspan fill="#d29922">high</tspan>      NET_RAW_IP                background.js  hardcoded IP endpoint</text>
  <text x="24" y="280" fill="#c9d1d9" xml:space="preserve"><tspan fill="#d29922">high</tspan>      PRIV_KEY_LISTENER         inject.js:2    keystroke listener</text>
  <text x="24" y="300" fill="#8b949e" xml:space="preserve">…20 findings across 7 axes   (exit 1 — wire it into CI)</text>

  <text x="24" y="336" fill="#7ee787">$ crxray urls coupon-helper.crx</text>
  <text x="24" y="356" fill="#c9d1d9" xml:space="preserve">tracker:analytics  www.google-analytics.com  <tspan fill="#f85149">exfil beacon</tspan></text>
  <text x="24" y="376" fill="#c9d1d9" xml:space="preserve">raw-ip             198.51.100.42             <tspan fill="#f85149">no DNS trail</tspan></text>

  <text x="24" y="412" fill="#7ee787">$ crxray scan quick-notes/  &amp;&amp;  echo safe-to-install</text>
  <text x="24" y="432" fill="#c9d1d9" xml:space="preserve">risk 0/100 · <tspan fill="#28c840">MINIMAL</tspan>  ·  none — nothing in the rubric fired</text>
  <text x="24" y="452" fill="#28c840" xml:space="preserve">safe-to-install</text>
</svg>
